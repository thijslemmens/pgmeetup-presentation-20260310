<h1 id="the-eav-trap">The EAV Trap</h1>
<h2 id="how-most-cms-platforms-store-content">How most CMS platforms store content</h2>
<div class="columns">
<div>
<h3 id="generic-eav-schema">Generic EAV schema</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE TABLE</span> alf_node (
  id      <span class="hljs-type">bigint</span> <span class="hljs-keyword">PRIMARY KEY</span>,
  type_qname_id <span class="hljs-type">bigint</span> <span class="hljs-keyword">REFERENCES</span> alf_qname
);
<span class="hljs-keyword">CREATE TABLE</span> alf_qname (
  id        <span class="hljs-type">bigint</span> <span class="hljs-keyword">PRIMARY KEY</span>,
  local_name <span class="hljs-type">varchar</span>(<span class="hljs-number">200</span>)
);
<span class="hljs-keyword">CREATE TABLE</span> alf_node_properties (
  node_id       <span class="hljs-type">bigint</span> <span class="hljs-keyword">REFERENCES</span> alf_node,
  qname_id      <span class="hljs-type">bigint</span> <span class="hljs-keyword">REFERENCES</span> alf_qname,
  string_value  <span class="hljs-type">varchar</span>(<span class="hljs-number">1024</span>),
  boolean_value bit,
  int_value     int8,
  double_value  float8,
  ...
);
</code></pre>
</div>
<div>
<h3 id="what-you-actually-want">What you actually want</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE TABLE</span> articles (
  id           uuid <span class="hljs-keyword">PRIMARY KEY</span>,
  title        text        <span class="hljs-keyword">NOT NULL</span>,
  published_at timestamptz,
  word_count   <span class="hljs-type">integer</span>,
  author_id    uuid <span class="hljs-keyword">REFERENCES</span> authors
);
</code></pre>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-marpit-scope-t6lkxhtS="" data-theme="3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p" lang="en-US" style="--theme:3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p;">

<h1 id="eav-the-hidden-costs-12">EAV: The Hidden Costs (1/2)</h1>
<h2 id="data-integrity">Data integrity</h2>
<table>
<thead>
<tr>
<th>Concern</th>
<th>EAV</th>
<th>Native schema</th>
</tr>
</thead>
<tbody>
<tr>
<td>Type safety</td>
<td>One column per data type</td>
<td>Enforced by the column type</td>
</tr>
<tr>
<td>Constraints</td>
<td><code>NOT NULL</code>, <code>UNIQUE</code> cannot be expressed</td>
<td>Declarative, DB-enforced</td>
</tr>
<tr>
<td>Referential integrity</td>
<td>Application-enforced</td>
<td>Foreign keys</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-marpit-scope-wj1ATaq7="" data-theme="3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p" lang="en-US" style="--theme:3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p;">
<h1 id="eav-the-hidden-costs-22">EAV: The Hidden Costs (2/2)</h1>
<h2 id="performance--tooling">Performance &amp; tooling</h2>

<table>
<thead>
<tr>
<th>Concern</th>
<th>EAV</th>
<th>Native schema</th>
</tr>
</thead>
<tbody>
<tr>
<td>Query complexity</td>
<td>Reconstruct one node via dozens of <code>JOIN</code>s</td>
<td>Plain <code>SELECT</code></td>
</tr>
<tr>
<td>Query planning</td>
<td>Value-column statistics mix all property types — per-attribute selectivity is invisible to the planner</td>
<td>Accurate per-column statistics</td>
</tr>
<tr>
<td>Index efficiency</td>
<td>Index on <code>(qname_id, string_value)</code> covers all attributes of type string</td>
<td>Targeted per-column indexes</td>
</tr>
<tr>
<td>Tooling compatibility</td>
<td>Breaks ORMs, analytics tools</td>
<td>Works out of the box</td>
</tr>
<tr>
<td>Search performance</td>
<td>Sync to Solr/Elasticsearch — operational heavy, denormalizes relations, eventual consistency</td>
<td>Native full-text search, joins, transactional consistency</td>
</tr>
</tbody>
</table>
<blockquote>
<p>EAV trades correctness and performance for schema flexibility — but you can have both.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-theme="3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p" lang="en-US" style="--theme:3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p;">

<h1 id="our-approach">Our Approach</h1>
<h2 id="generating-native-schemas-from-semantic-models">Generating native schemas from semantic models</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-marpit-scope-p8Ciwgdj="" data-theme="3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p" lang="en-US" style="--theme:3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p;">
<h1 id="two-platforms">Two Platforms</h1>
<h2 id="one-to-define-the-model-one-to-run-it">One to define the model. One to run it.</h2>
<div class="columns">
<div>
<div class="platform-card">
<div class="platform-label">Management Platform</div>
<p><img src="console.png" alt="Console" /></p>
<div class="platform-caption">ContentGrid Console — define entities, attributes, permissions</div>
</div>
</div>
<div>
<div class="platform-card runtime">
<div class="platform-label">Runtime Platform</div>
<p><img src="navigator.png" alt="Navigator" /></p>
<div class="platform-caption">ContentGrid Navigator — end-user app, driven by the model</div>
</div>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-marpit-scope-YZEwPVaT="" data-theme="3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p" lang="en-US" style="--theme:3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p;">
<h1 id="the-management-platform">The Management Platform</h1>
<div class="flow">
  <div class="comp"><h3>Architect</h3><p>Source of truth for the domain model — entities, attributes, relations</p></div>
  <div class="arr">→</div>
  <div class="comp"><h3>Scribe</h3><p>Compiles model changes into:<br />
      &#x2022; JSON model<br />
      &#x2022; Flyway SQL migrations<br />
      &#x2022; OPA policies</p></div>
  <div class="arr">→</div>
  <div class="comp"><h3>Captain</h3><p>
  &#x2022; Provisions database <br />
  &#x2022; manages credentials <br />
  &#x2022; deployment</p></div>
</div>
<div class="tagline">Every model change → versioned, reviewed SQL migration &nbsp;·&nbsp; Schema always reflects the model — no manual DDL</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-marpit-scope-eDZXu9kU="" data-theme="3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p" lang="en-US" style="--theme:3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p;">
<h1 id="model-driven-schema-generation">Model-Driven Schema Generation</h1>
<div class="columns">
<div>

<h1 id="the-runtime-platform">The Runtime Platform</h1>
<h2 id="how-a-request-flows-from-client-to-database">How a request flows from client to database</h2>
<div class="rt">
  <div class="rt-row">
    <div class="n"><h4>Client</h4><p>browser · API consumer</p></div>
    <div class="a"><span class="lbl">① + JWT</span><span class="sym">▶</span></div>
    <div class="n"><h4>Gateway</h4><p>entry point · routing · CORS</p></div>
    <div class="a"><span class="lbl">④ residual JWT</span><span class="sym">▶</span></div>
    <div class="n"><h4>App Server</h4><p>model-driven REST · dynamic SQL</p></div>
    <div class="a"><span class="lbl">⑤ SQL + filter</span><span class="sym">▶</span></div>
    <div class="n navy"><h4>PostgreSQL</h4><p>bespoke schema · filtered rows</p></div>
  </div>
  <div class="rt-conn">
    <div class="v">↕</div>
    <div class="g"></div>
    <div class="v">↕</div>
    <div class="g"></div>
    <div class="e"></div>
    <div class="g"></div>
    <div class="e"></div>
  </div>
  <div class="rt-row">
    <div class="n teal"><h4>Keycloak</h4><p>OIDC · issues JWT with user attributes</p></div>
    <div class="g"></div>
    <div class="n amber"><h4>OPA</h4><p>② policy query · ③ residual expression</p></div>
    <div class="g"></div>
    <div class="e"></div>
    <div class="g"></div>
    <div class="e"></div>
  </div>
  <div class="callout">Gateway encodes OPA's residual as a JWT claim — App Server applies it as a SQL <code>WHERE</code> filter</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-marpit-scope-yFey0Rfj="" data-theme="3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p" lang="en-US" style="--theme:3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p;">
<h1 id="partial-evaluation-the-key-insight">Partial Evaluation: The Key Insight</h1>
<div class="comparison">
<div class="col bad">
<h3 id="na%C3%AFve-approach">Naïve approach</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>for each row in invoices:     ← full table scan
  if OPA.check(row, user):    ← N network calls
    return row
</code></pre>
<div class="note">N rows fetched, N OPA calls, unauthorized data in memory</div>
</div>
<div class="col good">
<h3 id="partial-evaluation">Partial evaluation</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>OPA.partial_eval(policy, user)  ← 1 call, no entity data
    → residual: dept='sales'
      OR status='published'

SELECT * FROM invoices
WHERE dept='sales'
  OR status='published'          ← filtered at the DB
</code></pre>
<div class="note">1 OPA call, unauthorized rows never leave PostgreSQL</div>
</div>
</div>
<div class="highlight">The security boundary is enforced inside the database — not in application memory</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-marpit-scope-dDk4vRmi="" data-theme="3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p" lang="en-US" style="--theme:3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p;">
<h1 id="from-policy-rule-to-sql-filter">From Policy Rule to SQL Filter</h1>
<div class="steps">
<div class="row">
<div class="row-label">① Policy condition</div>
<pre>entity.department == user.department
OR entity.status == "published"</pre>
</div>
<div class="row">
<div class="row-label">② OPA partial eval</div>
<pre>OPA.partial_eval(policy, user)
  → dept == user.dept  OR  status == "published"</pre>
</div>
<div class="row">
<div class="row-label">③ SQL WHERE (JOOQ)</div>
<pre>SELECT * FROM invoices
WHERE department = 'sales' OR status = 'published'</pre>
</div>
</div>
<div class="note">Defined in Architect UI → compiled to Rego by Scribe → evaluated by OPA (1 call, result in Gateway JWT) → App Server builds JOOQ predicate</div>
<div class="highlight-light">Unauthorized rows never leave the database — the filter runs inside PostgreSQL</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-theme="3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p" lang="en-US" style="--theme:3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p;">
<h1 id="roadmap">Roadmap</h1>
<ul>
<li>Full text search</li>
<li>Facetted Search</li>
<li>Searching over multiple entities (tables)</li>
<li>Versioning (QDA)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-class="dark" data-theme="3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p" lang="en-US" class="dark" style="--class:dark;--theme:3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p;">
<h1 id="conclusions">Conclusions</h1>
<ul>
<li>EAV trades correctness &amp; performance for flexibility — you can have both</li>
<li>Native schemas: 20× smaller, full SQL tooling, real constraints</li>
<li>ContentGrid generates &amp; migrates schemas from a semantic model</li>
<li>Security boundary enforced inside PostgreSQL via partial evaluation</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-class="center" data-theme="3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p" lang="en-US" class="center" style="--class:center;--theme:3fq6vmdsy91cs8ppz0boyamc4cdm1nllqjjwul9mf4p;">
